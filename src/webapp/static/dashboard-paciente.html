<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - Salud Chilecito</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header h1 {
            color: #333;
            font-size: 1.5rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info span {
            color: #666;
        }
        .logout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        .logout-btn:hover {
            transform: translateY(-2px);
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        .table tr:hover {
            background: #f9f9f9;
        }
        .status {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status.confirmado {
            background: #d4edda;
            color: #155724;
        }
        .status.pendiente {
            background: #fff3cd;
            color: #856404;
        }
        .status.cancelado {
            background: #f8d7da;
            color: #721c24;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-state p {
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Mi Panel - Salud Chilecito</h1>
            <div class="user-info">
                <span id="userName">Usuario</span>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div class="card">
            <h2>📅 Solicitar Nuevo Turno</h2>
            <button class="btn" onclick="solicitarTurno()">Solicitar Turno</button>
        </div>

        <div class="card">
            <h2>📋 Mis Turnos</h2>
            <div id="turnosContainer" class="loading">Cargando turnos...</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login';
            return;
        }

        // Obtener información del usuario del token
        function loadUserInfo() {
            try {
                // Decodificar el token JWT (simple)
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                const data = JSON.parse(jsonPayload);
                
                document.getElementById('userName').textContent = data.nombre || data.email || 'Usuario';
            } catch (error) {
                console.error('Error al cargar información del usuario:', error);
                document.getElementById('userName').textContent = 'Usuario';
            }
        }

        // Mostrar mensaje de turnos
        function loadTurnos() {
            const container = document.getElementById('turnosContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <p>📅 Para ver y gestionar tus turnos</p>
                    <p>Ve a la página principal usando el botón "Solicitar Turno"</p>
                </div>
            `;
        }

        // Solicitar nuevo turno
        function solicitarTurno() {
            window.location.href = '/';
        }

        // Cerrar sesión
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }

        // Cargar datos al iniciar
        loadUserInfo();
        loadTurnos();
    </script>
</body>
</html>
