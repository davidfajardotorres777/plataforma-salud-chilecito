<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bot IA - Salud Chilecito</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="bot-page">
    <div class="bot-shell">
      <header class="bot-topbar">
        <a class="brand bot-brand" href="/">
          <img src="/static/logo.svg" alt="Salud Chilecito">
          <div>
            <strong>Salud Chilecito</strong>
            <span>Bot IA operativo</span>
          </div>
        </a>
        <nav class="bot-nav" aria-label="Plataformas">
          <a href="/">Panel grafico</a>
          <a aria-current="page" href="/bot">Bot IA</a>
        </nav>
      </header>

      <main class="bot-layout">
        <section class="bot-chat" aria-label="Conversacion con el bot">
          <div class="chat-messages" id="chatMessages"></div>
          <form class="bot-form" id="botForm">
            <label class="sr-only" for="botInput">Mensaje</label>
            <textarea id="botInput" rows="2" placeholder="Escribi una orden para la plataforma" required></textarea>
            <button type="submit">Enviar</button>
          </form>
        </section>

        <aside class="bot-side">
          <div class="panel">
            <div class="panel-head">
              <h2>Atajos</h2>
              <span>Comandos listos</span>
            </div>
            <div class="quick-actions">
              <button type="button" data-command="resumen">Resumen</button>
              <button type="button" data-command="listar pacientes">Pacientes</button>
              <button type="button" data-command="listar turnos">Turnos</button>
              <button type="button" data-command="listar centros">Centros</button>
              <button type="button" data-command="listar medicos">Medicos</button>
              <button type="button" data-command="listar documentos">Documentos</button>
            </div>
          </div>

          <div class="panel examples-panel">
            <div class="panel-head">
              <h2>Ejemplos</h2>
              <span>Copiar al chat</span>
            </div>
            <div class="command-list">
              <button type="button" data-command="crear paciente nombre Ana Diaz dni 50111222 telefono 3825-111222 distrito Chilecito obra social APOS">Crear paciente</button>
              <button type="button" data-command="editar paciente 1 telefono 3825-999000 distrito Nonogasta">Editar paciente</button>
              <button type="button" data-command="crear turno paciente 1 medico 1 fecha 2026-06-20 hora 09:30 motivo control">Crear turno</button>
              <button type="button" data-command="editar turno 1 fecha 2026-06-21 hora 10:00 motivo control reprogramado">Editar turno</button>
              <button type="button" data-command="eliminar turno 2">Eliminar turno</button>
              <button type="button" data-command="crear documento paciente 1 tipo ESTUDIO archivo resultado.txt contenido Resultado normal">Crear documento</button>
            </div>
          </div>
        </aside>
      </main>
    </div>
    <script src="/static/bot.js"></script>
  </body>
</html>
