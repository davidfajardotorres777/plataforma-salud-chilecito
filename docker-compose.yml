services:
  mongodb:
    image: mongo:4.4
    container_name: mongodb_salud_chilecito
    ports:
      - "27017:27017"
    shm_size: "1g"
    environment:
      MONGO_INITDB_DATABASE: salud_chilecito
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis_salud_chilecito
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: python:3.12-slim
    container_name: salud_api
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  mongodb_data:
  redis_data:
