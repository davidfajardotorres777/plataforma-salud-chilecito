version: '3.9'

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_salud_chilecito
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: salud
      APP_USER_PASSWORD: salud123
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle_data:
    name: oracle_salud_chilecito_data
