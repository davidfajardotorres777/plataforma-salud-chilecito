services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_salud_chilecito
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: salud
      APP_USER_PASSWORD: salud123
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  oracle_data:
