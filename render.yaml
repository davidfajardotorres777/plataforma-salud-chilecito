services:
  # Servicio web principal
  - type: web
    name: salud-chilecito
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.webapp.server
    envVars:
      - key: PYTHON_VERSION
        value: 3.13
      - key: MONGO_URI
        fromService:
          type: pserv
          name: mongodb
          property: connectionString
      - key: DB_NAME
        value: salud_chilecito
      - key: REDIS_HOST
        fromService:
          type: pserv
          name: redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: pserv
          name: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: pserv
          name: redis
          property: password
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://salud-chilecito.onrender.com
      - key: ENVIRONMENT
        value: production

  # Servicio MongoDB
  - type: pserv
    name: mongodb
    plan: free
    databaseName: salud_chilecito
    ipAllowList: []

  # Servicio Redis
  - type: pserv
    name: redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
